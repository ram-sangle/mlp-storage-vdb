name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v4

    # 1. Environment Setup
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest" # Resolves to the latest stable version automatically

#    # 2. Fast Lint Check (Fails fast if code style is wrong)
#    - name: Install lint dependencies
#      run: uv pip install --system ruff
#
#    - name: Run ruff check
#      run: ruff check
#
#    - name: Run ruff format check
#      run: ruff format --check

    # 3. System and Test Dependencies
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libopenmpi-dev openmpi-common openmpi-bin 

    - name: Install package and test dependencies
      run: uv sync # Automatically creates the environment and locks dependencies

    # 4. Heavy Lifting (Runs only if linting passed)
    - name: Run unit tests
      run: uv run pytest # Runs your tests safely inside the managed environment
